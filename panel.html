<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBAHBS Geri Bildirim — Sonuç Paneli</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #141412; --surface: #1e1d1b; --surface-2: #25241f; --border: #2e2d2a; --border-hover: #3d3c38;
    --text: #f0ede8; --muted: #8a8780; --accent: #3b82f6; --radius: 14px; --radius-sm: 9px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; -webkit-font-smoothing: antialiased; }
  .container { max-width: 860px; margin: 0 auto; }
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  h1 { font-size: 22px; font-weight: 650; letter-spacing: -0.4px; }
  .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .actions { display: flex; gap: 8px; }
  .btn { font-size: 13px; color: var(--muted); text-decoration: none; border: 1px solid var(--border); border-radius: 20px; padding: 8px 15px; white-space: nowrap; cursor: pointer; background: none; transition: all .12s; }
  .btn:hover { border-color: var(--border-hover); color: var(--text); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.2rem; }
  .card .num { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .card .lab { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .card.hl .num { color: #d6b25a; }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.35rem; margin-bottom: 1.25rem; }
  .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .section .hint { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.55; }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 9px; }
  .bar-label { flex-shrink: 0; width: 150px; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-wrap { flex: 1; background: var(--bg); border-radius: 6px; height: 24px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 6px; min-width: 2px; transition: width .4s ease; }
  .bar-val { flex-shrink: 0; width: 92px; text-align: right; font-size: 12.5px; color: var(--muted); }

  .top { display: flex; flex-direction: column; gap: 8px; }
  .top-item { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .top-item:last-child { border-bottom: none; }
  .rank { flex-shrink: 0; font-size: 14px; font-weight: 700; color: var(--muted); width: 24px; text-align: center; }
  .top-body { flex: 1; min-width: 0; }
  .top-text { font-size: 14px; line-height: 1.5; }
  .top-meta { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 6px; }
  .badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 550; border: 1px solid; }
  .badge.module { color: var(--muted); background: var(--surface-2); border-color: var(--border); }
  .badge.mins { color: #d6b25a; background: #2c2410; border-color: #5a4a1e; }
  .top-votes { flex-shrink: 0; text-align: center; }
  .top-votes .v { font-size: 18px; font-weight: 700; }
  .top-votes .l { font-size: 11px; color: var(--muted); }

  .status { text-align: center; color: var(--muted); font-size: 14px; padding: 3rem 1rem; }
  @media (max-width: 560px) { body { padding: 1.25rem .85rem 3rem; } .bar-label { width: 110px; } }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>Sonuç Paneli</h1>
      <div class="sub">SBAHBS geri bildirim özeti — <span id="ts"></span></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="location.reload()">↻ Yenile</button>
      <button class="btn primary" id="csvBtn">⬇ Excel (CSV)</button>
      <a class="btn" href="index.html">← Geri</a>
    </div>
  </div>

  <div id="content"><div class="status">Yükleniyor...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://vbobeqgambooxtfefxmd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZib2JlcWdhbWJvb3h0ZmVmeG1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjY4MjUsImV4cCI6MjA5MzY0MjgyNX0.-JAFm0N2NrEcS9qX-S6t0lx0att63agcR_wWrio6sOE';
const CAT_COLORS = { 'Kolaylaştırılmalı':'#3b82f6','Yavaş / Performans':'#f59e0b','Bulması zor':'#a855f7','Eksik özellik':'#22c55e','Hata / Bug':'#ef4444' };
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let IDEAS = [];

async function loadAll() {
  let stats = { participants: 0, participant_cities: 0, idea_cities: 0 };
  try {
    const [ri, rs] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/ideas?select=*`, { headers: H }),
      fetch(`${SUPABASE_URL}/rest/v1/rpc/get_stats`, { method: 'POST', headers: H, body: '{}' }),
    ]);
    IDEAS = await ri.json();
    if (rs.ok) { const t = await rs.text(); if (t) stats = JSON.parse(t); }
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="status">Bağlantı hatası.</div>';
    return;
  }
  render(IDEAS, stats);
}

function groupBy(arr, key) {
  const m = {};
  arr.forEach(i => { const k = i[key] || '(belirtilmemiş)'; (m[k] = m[k] || { count: 0, votes: 0 }); m[k].count++; m[k].votes += (i.votes || 0); });
  return m;
}
function bars(map, opts) {
  const entries = Object.entries(map).sort((a, b) => b[1][opts.by] - a[1][opts.by]);
  const max = Math.max(1, ...entries.map(e => e[1][opts.by]));
  return entries.map(([label, v]) => {
    const val = v[opts.by];
    const color = opts.color ? opts.color(label) : '#3b82f6';
    return `<div class="bar-row">
      <div class="bar-label" title="${esc(label)}">${esc(label)}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${(val / max * 100).toFixed(1)}%;background:${color}"></div></div>
      <div class="bar-val">${v.count} öneri · ${v.votes} oy</div>
    </div>`;
  }).join('');
}

function render(ideas, stats) {
  const totalVotes = ideas.reduce((s, i) => s + (i.votes || 0), 0);
  const withMin = ideas.filter(i => i.minutes != null && i.minutes > 0);
  const weightedDailyMin = withMin.reduce((s, i) => s + i.minutes * Math.max(1, i.votes || 1), 0);
  const weightedHours = Math.round(weightedDailyMin / 60);
  const cities = Math.max(stats.participant_cities || 0, stats.idea_cities || 0);

  const cards = `
    <div class="cards">
      <div class="card"><div class="num">${ideas.length}</div><div class="lab">Toplam geri bildirim</div></div>
      <div class="card"><div class="num">${totalVotes}</div><div class="lab">Toplam oy</div></div>
      <div class="card"><div class="num">${stats.participants || 0}</div><div class="lab">Katılımcı hekim</div></div>
      <div class="card"><div class="num">${cities}</div><div class="lab">Farklı il</div></div>
      <div class="card hl"><div class="num">~${weightedHours.toLocaleString('tr-TR')} sa</div><div class="lab">Oyla ağırlıklı toplam günlük zaman kaybı</div></div>
    </div>`;

  const catMap = groupBy(ideas, 'category');
  const modMap = groupBy(ideas, 'module');
  const branMap = groupBy(ideas, 'bransh');
  const gecisMap = groupBy(ideas, 'gecis');

  const catSection = `<div class="section"><h2>Kategoriye göre</h2>${bars(catMap, { by: 'votes', color: l => CAT_COLORS[l] || '#8a8780' })}</div>`;
  const modSection = `<div class="section"><h2>Modüle / ekrana göre — sorun nerede yoğunlaşıyor?</h2>${bars(modMap, { by: 'votes', color: () => '#3b82f6' })}<div class="hint">Çubuklar oy sayısına göre; en uzun çubuk = en çok talep gören modül.</div></div>`;

  const top = ideas.slice().sort((a, b) => (b.votes - a.votes) || (b.minutes || 0) - (a.minutes || 0)).slice(0, 10);
  const topSection = `<div class="section"><h2>En çok oy alan 10 geri bildirim</h2><div class="top">${
    top.map((i, idx) => {
      const c = CAT_COLORS[i.category] || '#8a8780';
      const mod = i.module ? `<span class="badge module">${esc(i.module)}</span>` : '';
      const min = (i.minutes > 0) ? `<span class="badge mins">~${i.minutes} dk/gün</span>` : '';
      return `<div class="top-item">
        <div class="rank">${idx + 1}</div>
        <div class="top-body"><div class="top-text">${esc(i.text)}</div>
          <div class="top-meta"><span class="badge" style="color:${c};border-color:${c};background:transparent">${esc(i.category)}</span>${mod}${min}</div>
        </div>
        <div class="top-votes"><div class="v">${i.votes}</div><div class="l">oy</div></div>
      </div>`;
    }).join('') || '<div class="status">Henüz veri yok.</div>'
  }</div></div>`;

  const branSection = (Object.keys(branMap).length && !(Object.keys(branMap).length === 1 && branMap['(belirtilmemiş)']))
    ? `<div class="section"><h2>Branşa göre (öneri verenler)</h2>${bars(branMap, { by: 'count', color: () => '#a855f7' })}</div>` : '';
  const gecisSection = (Object.keys(gecisMap).length && !(Object.keys(gecisMap).length === 1 && gecisMap['(belirtilmemiş)']))
    ? `<div class="section"><h2>SB-AHBS deneyim süresine göre (öneri verenler)</h2>${bars(gecisMap, { by: 'count', color: () => '#d6b25a' })}</div>` : '';

  const timeHint = withMin.length
    ? `<div class="section"><h2>Zaman kaybı tahmini</h2>
        <div class="bar-val" style="width:auto;text-align:left;font-size:14px;color:var(--text)">
          ${withMin.length} geri bildirimde süre işaretlendi. Oyla ağırlıklı toplam: <b>~${weightedHours.toLocaleString('tr-TR')} saat/gün</b>.
        </div>
        <div class="hint">Hesap: her geri bildirim için (işaretlenen günlük dk × o geri bildirime verilen oy) toplandı.
        Bu, katılan hekimlerin beyanına dayalı bir <b>tahmindir</b>; kesin ölçüm değildir. Sunumda "katılımcı beyanı" olarak belirtilmesi önerilir.</div>
      </div>` : '';

  document.getElementById('content').innerHTML = cards + catSection + modSection + timeHint + topSection + branSection + gecisSection;
}

function toCSV(rows) {
  const cols = ['id','category','module','votes','minutes','bransh','il','gecis','created_at','text'];
  const head = cols.join(',');
  const esc = (v) => { v = (v == null ? '' : String(v)); return /[",\n;]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  const body = rows.map(r => cols.map(c => esc(r[c])).join(',')).join('\n');
  return '﻿' + head + '\n' + body; // BOM -> Excel Türkçe
}
function downloadCSV() {
  const blob = new Blob([toCSV(IDEAS)], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sbahbs-geribildirim.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('ts').textContent = new Date().toLocaleString('tr-TR');
document.getElementById('csvBtn').onclick = downloadCSV;
loadAll();
</script>
</body>
</html>
